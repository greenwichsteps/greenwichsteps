<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lee Wang</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafaf9;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      max-width: 480px;
      width: 100%;
    }

    .name {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.01em;
    }

    .divider {
      width: 2rem;
      height: 2px;
      background-color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .contact-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .contact-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .contact-link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Lee Wang</h1>
    <p class="tagline">greenwichsteps.com</p>
    <div class="divider"></div>
    <p class="contact-label">Get in touch</p>
    <a class="contact-link" href="mailto:lee@greenwichsteps.com">lee@greenwichsteps.com</a>
  </main>
</body>
</html>
